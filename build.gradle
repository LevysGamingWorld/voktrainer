plugins {
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.0.14'
}

group = 'com.vokabeltrainer'
version = '2.0.0'

repositories {
    mavenCentral()
}

javafx {
    version = '21'
    modules = [ 'javafx.controls', 'javafx.fxml' ]
}

application {
    mainClass = 'com.vokabeltrainer.Main'
}

dependencies {
    implementation 'com.google.code.gson:gson:2.11.0'
}

jar {
    archiveFileName = 'VokabelTrainer.jar'
    manifest {
        attributes 'Main-Class': 'com.vokabeltrainer.Main'
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    from {
        configurations.runtimeClasspath
            .findAll { !it.name.toLowerCase().contains('javafx') }
            .collect { it.isDirectory() ? it : zipTree(it) }
    }
}
